- name: Transfer Credit Review Tool
  type: Administrative workflow automation
  status: Built and used
  audience: University departments and registrar workflows
  visibility: Private repository
  summary: An AI-built review pipeline for departmental transfer-credit evaluation. The tool turns an annual transfer review export into structured, scored, faculty-reviewable materials and a registrar-ready output.
  problem: Transfer-credit review requires departments to compare external course records against local catalog expectations, collect faculty input, preserve decisions, and return clean records for registrar processing.
  artifact:
    - Transfer-credit review skill
    - Parsed and deduplicated course records
    - Formatted department review workbook
    - Faculty reviewer Word documents
    - Annotation-tracked review workbook
    - Registrar-ready export
  process:
    - Filter records by UST subject code.
    - Deduplicate to unique course and institution pairs.
    - Gather course descriptions, catalog links, and syllabus links.
    - Score candidate matches against the UST course catalog with TF-IDF cosine similarity.
    - Generate reviewer materials and extract annotations back into the workbook.
    - Produce a registrar-ready export without publishing private review decisions.
  result: Used for the 2026 Chemistry transfer-credit review with 109 reviewed courses after 5 were held for additional review.
  links:
    - label: Repository status
      value: Private GitHub repository

