- name: Biochar Simulator
  type: Research software
  status: Active
  audience: Molecular dynamics and computational chemistry researchers
  visibility: Public repository and documentation
  summary: An AI-built Python package for generating model biochar surfaces for molecular dynamics simulations and visualization.
  problem: Building plausible biochar structures by hand is difficult, tedious, and error-prone, especially when researchers need structures that reflect production conditions or selected material properties.
  artifact:
    - Python package named biochar
    - Conda-forge install path
    - Generated molecular biochar structures
    - GROMACS-style simulation files
    - Structure statistics and property summaries
    - Sphinx documentation on Read the Docs
  process:
    - Accept temperature/feedstock dependence or user-selected structural properties.
    - Generate biochar surfaces with configurable size, aromaticity, and heteroatom content.
    - Determine charges from the selected force field or a QM calculation.
    - Use RDKit and supporting Python libraries to build inspectable molecular structures.
    - Publish source, documentation, and installation instructions for reuse.
  result: Actively maintained research software used in Josh's biochar and PFAS-related computational chemistry work.
  links:
    - label: Source repository
      url: https://github.com/jolayfield/biochar-simulator
    - label: Documentation
      url: https://biochar-simulator.readthedocs.io/en/latest/
